<div class="card" 
     [class.app-form-toolbar--sticky]="showStickyClass"
     [class.app-form-toolbar--loading]="loading">
  
  <div class="card-header border-0 pt-6 pb-6">
    
    <!-- Sección izquierda con título y status -->
    <div class="card-title" style="margin-bottom: 0 !important">
      <div class="d-flex align-items-center gap-4 flex-grow-1">
        
        <!-- Botón Volver -->
        <app-button
          *ngIf="config.showBackButton"
          [label]="config.backButtonLabel || 'Volver'"
          icon="pi-arrow-left"
          variant="ghost"
          size="md"
          [disabled]="loading"
          (buttonClick)="onBack()">
        </app-button>
        
        <!-- Título y subtítulo -->
        <div class="flex-grow-1" *ngIf="config.title">
          <h3 class="card-label fw-bolder fs-2 mb-1">
            {{ config.title }}
          </h3>
          <span *ngIf="config.subtitle" class="text-muted mt-1 fw-bold fs-7">
            {{ config.subtitle }}
          </span>
        </div>
        
        <!-- Indicador de cambios sin guardar -->
        <div *ngIf="isDirty && showDirtyTag" class="d-flex align-items-center">
          <span class="status-indicator">
            <i class="pi pi-circle-fill text-warning"></i>
            <span class="status-text">Cambios sin guardar</span>
          </span>
        </div>
        
      </div>
    </div>
    
    <!-- Sección derecha con botones -->
    <div class="card-toolbar">
      <div class="d-flex justify-content-end align-items-center gap-3" data-kt-customer-table-toolbar="base">
        
        <!-- Botones personalizados -->
        <div *ngIf="visibleButtons.length > 0" class="d-flex gap-2">
          <app-button
            *ngFor="let button of visibleButtons"
            [label]="button.label"
            [icon]="button.icon"
            [variant]="button.variant || 'secondary'"
            [outline]="button.outline"
            [size]="button.size || 'lg'"
            [disabled]="button.disabled || loading"
            (buttonClick)="onButtonClick(button)">
          </app-button>
        </div>
        
        <!-- Botones principales -->
        <div class="d-flex gap-2">
          <app-button
            *ngIf="config.showCancelButton"
            [label]="config.cancelButtonLabel || 'Cancelar'"
            icon="pi-times"
            variant="secondary"
            size="lg"
            [disabled]="loading"
            (buttonClick)="onCancel()">
          </app-button>
          
          <app-button
            *ngIf="config.showSaveButton"
            [label]="config.saveButtonLabel || 'Guardar'"
            [icon]="saveButtonIcon"
            variant="primary"
            size="lg"
            [disabled]="saveButtonDisabled"
            (buttonClick)="onSave()">
          </app-button>
        </div>
        
      </div>
    </div>
    
  </div>
</div>
