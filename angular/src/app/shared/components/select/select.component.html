<!-- Label -->
<label *ngIf="label" class="form-label fw-bold fs-6 mb-2">
  <span *ngIf="!showQuickCreate">{{ label }}</span>
  <a *ngIf="showQuickCreate && !effectiveDisabled" 
     href="javascript:void(0)" 
     (click)="onQuickCreateClick()"
     class="text-primary text-hover-primary fw-bold">
    {{ label }}
  </a>
  <span *ngIf="showQuickCreate && effectiveDisabled" class="text-muted">
    {{ label }}
  </span>
  <span 
    *ngIf="required || isRequired" 
    class="ms-1 required-asterisk"
    [class.valid]="isValid">*</span>
</label>

<!-- Select Component -->
<ng-select
  #ngSelectRef
  [items]="items"
  [bindValue]="bindValue"
  [bindLabel]="bindLabel"
  [placeholder]="effectivePlaceholder"
  [disabled]="effectiveDisabled"
  [readonly]="readonly"
  [required]="required"
  [clearable]="clearable && !effectiveDisabled"
  [searchable]="searchable && !effectiveDisabled"
  [multiple]="multiple"
  [virtualScroll]="virtualScroll"
  [loading]="loading"
  [typeahead]="searchable && !effectiveDisabled ? searchInput$ : undefined"
  [appendTo]="appendTo"
  [ngModel]="selectedValue"
  (ngModelChange)="onSelectionChange($event)"
  (open)="onOpen()"
  (close)="onClose()"
  (scrollToEnd)="onScrollToEnd()"
  (search)="onSearch($event)"
  [class.is-invalid]="hasError"
  [class.ng-invalid]="hasError"
  [class.dependent-disabled]="isDisabledByDependency"
  [class]="sizeClass">

  <!-- Custom label template -->
  <ng-template ng-label-tmp let-item="item" let-clear="clear">
    <ng-container *ngIf="!labelTemplate">
      <span class="text-primary fw-bold" *ngIf="showCode && bindCode && item[bindCode]">
        {{ item[bindCode] }}
      </span>
      <span *ngIf="showCode && bindCode && item[bindCode]" class="text-muted mx-1">-</span>
      <span>{{ item[bindLabel] }}</span>
    </ng-container>
    
    <ng-container *ngIf="labelTemplate">
      <ng-container *ngTemplateOutlet="labelTemplate; context: { $implicit: item, clear: clear }"></ng-container>
    </ng-container>
    
    <span class="ng-value-icon right" (click)="clear(item)" aria-hidden="true">×</span>
  </ng-template>

  <!-- Custom option template -->
  <ng-template ng-option-tmp let-item="item" let-search="searchTerm">
    <ng-container *ngIf="!optionTemplate">
      <div class="d-flex flex-column">
        <div class="fw-bold text-gray-800">{{ item[bindLabel] }}</div>
        <small class="text-muted" *ngIf="showCode && bindCode && item[bindCode]">
          {{ item[bindCode] }}
        </small>
      </div>
    </ng-container>
    
    <ng-container *ngIf="optionTemplate">
      <ng-container *ngTemplateOutlet="optionTemplate; context: { $implicit: item, searchTerm: search }"></ng-container>
    </ng-container>
  </ng-template>

  <!-- Loading template -->
  <ng-template ng-loadingspinner-tmp>
    <div class="d-flex align-items-center justify-content-center p-3">
      <div class="spinner-border spinner-border-sm text-primary me-2" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <span class="text-muted">Cargando opciones...</span>
    </div>
  </ng-template>

  <!-- Not found template -->
  <ng-template ng-notfound-tmp let-searchTerm="searchTerm">
    <div class="text-center p-3">
      <!-- Mensaje cuando está esperando valor dependiente -->
      <div *ngIf="dependentOn && isWaitingForDependentValue()" class="text-muted">
        <div class="mb-2">
          <i class="ki-outline ki-information fs-2x"></i>
        </div>
        <div class="fw-bold text-gray-600">
          {{ dependentPlaceholder || 'Seleccione primero ' + dependentOn }}
        </div>
      </div>

      <!-- Mensaje cuando no hay resultados -->
      <div *ngIf="!dependentOn || !isWaitingForDependentValue()" class="text-muted">
        <div class="mb-2">
          <i class="ki-outline ki-file-deleted fs-2x"></i>
        </div>
        <div class="fw-bold text-gray-600">No se encontraron resultados</div>
        <small class="text-muted" *ngIf="searchTerm">
          para "{{ searchTerm }}"
        </small>
        
        <!-- Quick create option -->
        <div *ngIf="showQuickCreate && !effectiveDisabled" class="mt-3">
          <button type="button" 
                  class="btn btn-sm btn-light-primary"
                  (click)="onQuickCreateClick()">
            <i class="ki-outline ki-plus fs-4"></i>
            {{ quickCreateText }}
          </button>
        </div>
      </div>
    </div>
  </ng-template>
</ng-select>

<!-- Validation feedback -->
<div *ngIf="hasError" class="text-danger fs-7 fw-bold mt-2">
  {{ errorMessage }}
</div>

<!-- Help text slot -->
<ng-content select="[slot=help]"></ng-content>
