<div class="reset-password-dialog">
  <form [formGroup]="form" (ngSubmit)="resetPassword()">
    <div class="p-fluid">
      <!-- Información del usuario -->
      <div class="mb-4 p-3 bg-primary-50 border-round">
        <div class="flex align-items-center gap-2 mb-2">
          <i class="pi pi-user text-primary"></i>
          <span class="font-semibold">{{ user.userName }}</span>
        </div>
        <div class="text-sm text-600">{{ user.email }}</div>
      </div>

      <!-- Nueva contraseña -->
      <div class="field mb-4">
        <app-input
          formControlName="password"
          label="Nueva contraseña"
          type="password"
          placeholder="Ingrese la nueva contraseña"
          [required]="true"
          errorMessage="La contraseña debe tener al menos 6 caracteres"
        >
        </app-input>
        <small class="text-500 mt-1">
          La contraseña debe tener al menos 6 caracteres
        </small>
      </div>

      <!-- Confirmar contraseña -->
      <div class="field mb-4">
        <app-input
          formControlName="confirmPassword"
          label="Confirmar contraseña"
          type="password"
          placeholder="Confirme la nueva contraseña"
          [required]="true"
          errorMessage="Debe confirmar la contraseña"
        >
        </app-input>
        <small class="text-danger" *ngIf="form.hasError('passwordMismatch') && confirmPassword?.touched">
          Las contraseñas no coinciden
        </small>
      </div>

      <!-- Advertencia -->
      <div class="mb-4 p-3 bg-orange-50 border-round flex align-items-start gap-2">
        <i class="pi pi-exclamation-triangle text-orange-500 mt-1"></i>
        <div class="text-sm text-600">
          <strong>Atención:</strong> El usuario deberá usar esta nueva contraseña
          para iniciar sesión. Asegúrese de comunicarle la nueva contraseña de forma segura.
        </div>
      </div>

      <!-- Botones de acción -->
      <div class="flex justify-content-end gap-2 mt-4">
        <p-button
          label="Cancelar"
          icon="pi pi-times"
          severity="secondary"
          (onClick)="cancel()"
          [disabled]="isLoading"
          [outlined]="true"
        ></p-button>
        <p-button
          label="Actualizar contraseña"
          icon="pi pi-check"
          type="submit"
          [loading]="isLoading"
          [disabled]="form.invalid"
        ></p-button>
      </div>
    </div>
  </form>
</div>
