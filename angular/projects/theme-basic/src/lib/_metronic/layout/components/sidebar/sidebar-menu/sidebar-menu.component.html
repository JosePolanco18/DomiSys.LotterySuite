<!--begin::Menu wrapper-->
<div id="kt_app_sidebar_menu_scroll" class="scroll-y my-5 mx-3" data-kt-scroll="true" data-kt-scroll-activate="true" data-kt-scroll-height="auto" data-kt-scroll-dependencies="#kt_app_sidebar_logo, #kt_app_sidebar_footer" data-kt-scroll-wrappers="#kt_app_sidebar_menu" data-kt-scroll-offset="5px" data-kt-scroll-save-state="true">
  <!--begin::Menu-->
  <div class="menu menu-column menu-rounded menu-sub-indention fw-semibold fs-6" id="#kt_app_sidebar_menu" data-kt-menu="true" data-kt-menu-expand="false">
    
    <!-- Dashboard por defecto (siempre visible) -->
    <div class="menu-item">
      <a class="menu-link without-sub" routerLink="/dashboard" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="element-11" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Dashboard</span>
      </a>
    </div>

    <!-- Menú dinámico de ABP -->
    <ng-container *ngFor="let route of routes$ | async; trackBy: trackByFn">
      
      <!-- Si no tiene children (menú simple) -->
      <div *ngIf="!route.children || route.children.length === 0" class="menu-item">
        <a class="menu-link without-sub" 
           [routerLink]="route.path" 
           routerLinkActive="active"
           *ngIf="route.path">
          <span class="menu-icon">
            <app-keenicon [name]="getIconName(route)" class="fs-2"></app-keenicon>
          </span>
          <span class="menu-title">{{ route.name }}</span>
        </a>
      </div>

      <!-- Si tiene children (menú accordion) -->
      <div *ngIf="route.children && route.children.length > 0" 
           class="menu-item menu-accordion" 
           data-kt-menu-trigger="click" 
           routerLinkActive="here show">
        
        <span class="menu-link">
          <span class="menu-icon">
            <app-keenicon [name]="getIconName(route)" class="fs-2"></app-keenicon>
          </span>
          <span class="menu-title">{{ route.name }}</span>
          <span class="menu-arrow"></span>
        </span>

        <div class="menu-sub menu-sub-accordion" routerLinkActive="menu-active-bg">
          
          <!-- Children del menú -->
          <ng-container *ngFor="let child of route.children; trackBy: trackByFn">
            
            <!-- Child sin sub-children -->
            <div *ngIf="!child.children || child.children.length === 0" class="menu-item">
              <a class="menu-link without-sub" 
                 [routerLink]="child.path" 
                 routerLinkActive="active"
                 *ngIf="child.path">
                <span class="menu-bullet">
                  <span class="bullet bullet-dot"></span>
                </span>
                <span class="menu-title">{{ child.name }}</span>
              </a>
            </div>

            <!-- Child con sub-children (submenu accordion) - AQUÍ ESTÁ EL CAMBIO -->
            <div *ngIf="child.children && child.children.length > 0" 
                 class="menu-item menu-accordion" 
                 routerLinkActive="here show" 
                 data-kt-menu-trigger="click">
              
              <span class="menu-link">
                <!-- CAMBIO: Usar icono en lugar de bullet para children con sub-children -->
                <span class="menu-icon">
                  <app-keenicon [name]="getIconName(child)" class="fs-2"></app-keenicon>
                </span>
                <span class="menu-title">{{ child.name }}</span>
                <span class="menu-arrow"></span>
              </span>

              <div class="menu-sub menu-sub-accordion" routerLinkActive="menu-active-bg">
                <div *ngFor="let grandChild of child.children; trackBy: trackByFn" class="menu-item">
                  <a class="menu-link without-sub" 
                     [routerLink]="grandChild.path" 
                     routerLinkActive="active"
                     *ngIf="grandChild.path">
                    <span class="menu-bullet">
                      <span class="bullet bullet-dot"></span>
                    </span>
                    <span class="menu-title">{{ grandChild.name }}</span>
                  </a>
                </div>
              </div>
            </div>

          </ng-container>
        </div>
      </div>

      <!-- Separador si está marcado -->
      <div *ngIf="route.separator" class="menu-item">
        <div class="menu-content pt-8 pb-2">
          <span class="menu-section text-muted text-uppercase fs-8 ls-1">{{ route.name }}</span>
        </div>
      </div>

    </ng-container>

  </div>
  <!--end::Menu-->
</div>
<!--end::Menu wrapper-->
