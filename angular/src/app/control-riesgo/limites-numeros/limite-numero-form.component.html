<app-form-toolbar [config]="formToolbarConfig"></app-form-toolbar>

<div class="card">
  <div class="card-body">
    <form [formGroup]="form" class="row">
      <div class="col-md-6">
        <app-select label="Lotería" formControlName="loteriaId" [service]="loteriaService" bindValue="id" bindLabel="nombre" placeholder="Seleccione..." [required]="true"></app-select>
      </div>
      <div class="col-md-6">
        <app-select label="Sorteo" formControlName="sorteoId" [service]="sorteoService" dependentOn="loteriaId" dependentMethod="getPorLoteria" bindValue="id" bindLabel="nombre" placeholder="Seleccione..." [required]="true"></app-select>
      </div>
      <div class="col-md-4">
        <app-input label="Número" type="number" formControlName="numero" [min]="0" [max]="99" placeholder="00" [required]="true"></app-input>
      </div>
      <div class="col-md-4">
        <app-input label="Límite Venta Máximo" type="currency" formControlName="limiteVentaMaximo" currency="DOP" [required]="true"></app-input>
      </div>
      <div class="col-md-4">
        <app-input label="Límite Aguante" type="currency" formControlName="limiteAguante" currency="DOP" [required]="true"></app-input>
      </div>
      <div class="col-md-6">
        <app-input label="Notas" type="textarea" formControlName="notas" [rows]="3"></app-input>
      </div>
      <div class="col-md-6 d-flex align-items-center">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" formControlName="bloqueado" id="bloqueadoSwitch">
          <label class="form-check-label" for="bloqueadoSwitch">Bloqueado</label>
        </div>
      </div>
    </form>
  </div>
</div>
